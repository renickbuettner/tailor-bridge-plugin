# ===================================
#  Settings Form Field Definitions
# ===================================

fields:
    api_enabled:
        label: Enable API
        comment: Master switch — when disabled, every companion app request is rejected.
        type: switch
        default: true

    token_expiry_days:
        label: Token expiry (days)
        comment: New tokens expire after this many days. 0 means tokens never expire.
        type: number
        default: 0

    journal_retention_days:
        label: Change journal retention (days)
        comment: Journal entries older than this are pruned daily. Devices that have not synced within this window perform a full re-sync.
        type: number
        default: 60

    logs_enabled:
        label: Expose error log to the app
        comment: Lets paired apps read the tail of the application log. Logs can contain sensitive data — disable to hide them.
        type: switch
        default: true

    pages_enabled:
        label: Expose static pages to the app
        comment: Lets paired apps browse and edit RainLab.Pages static pages. Has no effect when RainLab.Pages is not installed.
        type: switch
        default: true
