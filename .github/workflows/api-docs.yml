# Runs in the PUBLIC repo (renickbuettner/tailor-bridge-plugin) after the
# monorepo mirrors the plugin here. Validates the OpenAPI spec, checks it is
# in sync with the routes, and publishes rendered API docs to GitHub Pages.
name: API Docs

on:
  push:
    branches: [main]
    paths:
      - "routes.php"
      - "docs/openapi.yaml"
      - "scripts/check-openapi.php"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: api-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Check spec is in sync with routes
        run: php scripts/check-openapi.php

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@latest lint docs/openapi.yaml

      - name: Render API docs (Redoc)
        run: |
          mkdir -p _site
          npx --yes @redocly/cli@latest build-docs docs/openapi.yaml -o _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
