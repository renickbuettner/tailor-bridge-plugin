openapi: 3.0.3
info:
  title: Tailor Companion API
  version: "1.0.0"
  description: >-
    Token-authenticated REST API exposed by the Renick.TailorCompanion October
    CMS plugin. Lets a native client browse, sync and edit Tailor content
    offline-first. All responses use a `{ "data": ..., "meta": ... }` envelope;
    errors use `{ "error": { "code", "message" } }`.
  license:
    name: MIT
    url: https://github.com/renickbuettner/tailor-bridge-plugin/blob/main/LICENSE

servers:
  - url: "{baseUrl}/api/tailor-companion/v1"
    description: Your October CMS install
    variables:
      baseUrl:
        default: https://your-site.tld

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Schema
  - name: Entries
  - name: Sync
  - name: Files
  - name: System
  - name: Pages
    description: >-
      Static pages (optional RainLab.Pages integration). All endpoints answer
      404 `feature_unavailable` when the integration is missing or disabled;
      clients discover availability via `features.static_pages` on /ping.

paths:
  /auth/token:
    post:
      tags: [Auth]
      summary: Issue an access token from credentials
      description: >-
        Manual pairing path. Verifies a backend user's login and password and
        returns a bearer token. Hard-throttled (5/min). The primary pairing
        path is a QR code generated in the backend.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string }
                password: { type: string, format: password }
                device_name: { type: string, maxLength: 120 }
      responses:
        "201":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token: { type: string, description: Raw token — shown once }
                      token_prefix: { type: string }
                      name: { type: string, nullable: true }
                      expires_at: { type: string, format: date-time, nullable: true }
                      url: { type: string, format: uri }
                      user: { $ref: "#/components/schemas/UserInfo" }
        "401": { $ref: "#/components/responses/InvalidCredentials" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /sites:
    get:
      tags: [Auth]
      summary: List OctoberCMS sites
      description: >-
        The sites the client can switch between. Send the chosen site as an
        `X-Tailor-Site: <id>` header on all content endpoints; without it the
        primary site is used. Single-site installs report one site with
        `multisite: false`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Site" }
                  meta:
                    type: object
                    properties:
                      multisite: { type: boolean }
                      primary_site_id: { type: integer, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /ping:
    get:
      tags: [Auth]
      summary: Auth check and server metadata
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      api_version: { type: integer, example: 1 }
                      plugin_version: { type: string, nullable: true }
                      october_version: { type: string, nullable: true }
                      user: { $ref: "#/components/schemas/UserInfo" }
                      schema_version:
                        type: string
                        description: Global schema fingerprint; changes when any blueprint changes.
                      server_time: { type: string, format: date-time }
                      features:
                        type: object
                        description: Optional server capabilities. Clients treat a missing key as unavailable.
                        properties:
                          static_pages:
                            type: object
                            description: RainLab.Pages integration (optional dependency).
                            properties:
                              available: { type: boolean }
                              schema_version:
                                type: string
                                nullable: true
                                description: Pages layout-schema fingerprint; null while unavailable.
        "401": { $ref: "#/components/responses/Unauthorized" }

  /version:
    get:
      tags: [Auth]
      summary: Deployed build marker
      description: >-
        Dependency-free deploy check. Reports the `build` constant compiled into
        the running plugin code, so it confirms which code is actually live —
        independent of DB migrations and PHP OPcache — even when the optional
        static-pages subsystem is misconfigured. A `404` means the deployed code
        predates this endpoint; an old `build` means files updated but OPcache /
        PHP-FPM still serve stale bytecode.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      api_version: { type: integer, example: 1 }
                      build:
                        type: string
                        description: Code-level deploy marker (Plugin::BUILD).
                        example: "2026-07-10.1"
                      plugin_version: { type: string, nullable: true }
                      october_version: { type: string, nullable: true }
                      server_time: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /schema:
    get:
      tags: [Schema]
      summary: All blueprints, normalized
      description: >-
        Every entry blueprint and global aggregated into the wire structure the
        client renders forms from. `ETag` equals the global `schema_version`;
        send it back as `If-None-Match` to get `304`.
      parameters:
        - in: header
          name: If-None-Match
          schema: { type: string }
      responses:
        "200":
          description: OK
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/BlueprintSchema" }
                  meta:
                    type: object
                    properties:
                      schema_version: { type: string }
        "304": { description: Not modified (schema unchanged) }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /pages/schema:
    get:
      tags: [Pages]
      summary: Static page layouts, normalized
      description: >-
        Every static-page layout aggregated into a form definition using the
        same wire field format as /schema, so clients render page editors with
        no extra field UI. `ETag` equals `pages_schema_version`; send it back as
        `If-None-Match` to get `304`.
      parameters:
        - in: header
          name: If-None-Match
          schema: { type: string }
      responses:
        "200":
          description: OK
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      layouts:
                        type: array
                        items: { $ref: "#/components/schemas/LayoutSchema" }
                  meta:
                    type: object
                    properties:
                      pages_schema_version: { type: string }
        "304": { description: Not modified (pages schema unchanged) }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/FeatureUnavailable" }

  /pages/tree:
    get:
      tags: [Pages]
      summary: Static page hierarchy
      description: >-
        The nested page tree with per-page metadata and a `content_hash`
        (sha256 of the raw file). Clients diff hashes to pull only changed
        pages — there is no journal for static pages.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      pages:
                        type: array
                        items: { $ref: "#/components/schemas/PageTreeNode" }
                  meta:
                    type: object
                    properties:
                      pages_schema_version: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/FeatureUnavailable" }

  /pages/file/{fileName}:
    get:
      tags: [Pages]
      summary: One static page (full, editable)
      parameters:
        - $ref: "#/components/parameters/PageFileName"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Page" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Feature unavailable, or no page with this file name.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      tags: [Pages]
      summary: Update an existing static page
      description: >-
        Applies field changes to an existing page (v1 does not create, delete,
        move or rename pages). Send only changed fields. `base_hash` is the
        `content_hash` the edit was based on — a mismatch returns 409 with the
        current server page. url and layout are read-only; read-only/unknown
        fields come back as warnings with their rejected value.
      parameters:
        - $ref: "#/components/parameters/PageFileName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                base_hash:
                  type: string
                  nullable: true
                  description: content_hash the edit was based on; omit to force-apply.
                fields:
                  type: object
                  additionalProperties: true
                  description: Changed field values keyed by field name.
                viewbag_extra:
                  type: object
                  additionalProperties: true
                  description: Replacement lossless extras; omit to leave untouched.
      responses:
        "200":
          description: Applied (possibly with warnings)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Page" }
                  meta:
                    type: object
                    properties:
                      warnings:
                        type: array
                        items: { $ref: "#/components/schemas/FieldWarning" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Feature unavailable, or no page with this file name.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: The page changed on the server since it was loaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { $ref: "#/components/schemas/Error" }
                  server_state: { $ref: "#/components/schemas/Page" }

  /pages/menus:
    get:
      tags: [Pages]
      summary: Static menus (read-only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        code: { type: string }
                        name: { type: string, nullable: true }
                        content_hash: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/FeatureUnavailable" }

  /pages/menus/{code}:
    get:
      tags: [Pages]
      summary: One static menu with its item tree (read-only)
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Menu" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Feature unavailable, or no menu with this code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /entries/{uuid}:
    get:
      tags: [Entries]
      summary: Cursor-paginated entries of a blueprint
      parameters:
        - $ref: "#/components/parameters/BlueprintUuid"
        - in: query
          name: cursor
          schema: { type: integer, default: 0 }
          description: Last seen entry id; page returns entries with a greater id.
        - in: query
          name: per_page
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Entry" }
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        nullable: true
                        description: Present only on the first page (cursor=0).
                      has_more: { type: boolean }
                      next_cursor: { type: integer, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /entries/{uuid}/{id}:
    get:
      tags: [Entries]
      summary: A single entry
      parameters:
        - $ref: "#/components/parameters/BlueprintUuid"
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Entry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /logs:
    get:
      tags: [System]
      summary: Tail of the application error log
      description: >-
        Returns the last N lines of the OctoberCMS application log for a
        console view in the app. Read as a bounded reverse-tail, so a large
        log stays fast. Gated by the `logs_enabled` backend setting.
      parameters:
        - in: query
          name: lines
          schema: { type: integer, default: 1000, minimum: 1, maximum: 10000 }
          description: How many trailing lines to return (clamped to 10000).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: string }
                    description: Log lines, oldest first.
                  meta:
                    type: object
                    properties:
                      file: { type: string, nullable: true }
                      exists: { type: boolean }
                      size_bytes: { type: integer }
                      returned: { type: integer }
                      truncated:
                        type: boolean
                        description: True when the log has more lines than returned.
                      max_lines: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Log access disabled in backend settings (`logs_disabled`).

  /records/{uuid}/{field}:
    get:
      tags: [Entries]
      summary: Live search over a recordfinder field's target model
      description: >-
        A recordfinder field associates entries with a regular (non-Tailor)
        model that the app never syncs. This endpoint searches that model so
        the app can offer a picker. The model class is resolved server-side
        from the field definition — the client only names the blueprint and
        field. Results use the field's nameFrom column as the title.
      parameters:
        - $ref: "#/components/parameters/BlueprintUuid"
        - in: path
          name: field
          required: true
          schema: { type: string }
          description: The recordfinder field's name.
        - in: query
          name: q
          schema: { type: string }
          description: Search term matched against the display column.
        - in: query
          name: cursor
          schema: { type: integer, default: 0 }
          description: Last seen record id; page returns records with a greater id.
        - in: query
          name: per_page
          schema: { type: integer, default: 25, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        title: { type: string }
                        description: { type: string, nullable: true }
                  meta:
                    type: object
                    properties:
                      has_more: { type: boolean }
                      next_cursor: { type: integer, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /globals/{uuid}:
    get:
      tags: [Entries]
      summary: The single record of a global blueprint
      description: >-
        Globals have exactly one record — there is no list. Relation and
        repeater fields on globals are read-only via the API.
      parameters:
        - $ref: "#/components/parameters/BlueprintUuid"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Entry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sync/changes:
    get:
      tags: [Sync]
      summary: Incremental change journal
      description: >-
        Coalesced create/update/delete records since a cursor. Omit `since` to
        signal the client has no cursor yet (full pull required). A `since`
        older than pruned history returns `410`.
      parameters:
        - in: query
          name: since
          schema: { type: integer }
          description: Cursor from a previous response's `latest_cursor`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ChangeItem" }
                  meta:
                    type: object
                    properties:
                      full_pull_required: { type: boolean }
                      latest_cursor: { type: integer }
                      has_more:
                        type: boolean
                        description: The journal window was capped; request again with latest_cursor.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "410": { $ref: "#/components/responses/CursorExpired" }

  /sync/batch:
    post:
      tags: [Sync]
      summary: Apply a batch of write operations
      description: >-
        Operations are applied in order; each yields an independent result
        (`ok` / `conflict` / `error`). Blueprint validation always runs.
        Unknown or read-only fields are returned as warnings, never dropped
        silently. Max 100 ops per batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ops]
              properties:
                ops:
                  type: array
                  maxItems: 100
                  items: { $ref: "#/components/schemas/BatchOp" }
      responses:
        "200":
          description: Per-op results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      results:
                        type: array
                        items: { $ref: "#/components/schemas/BatchResult" }
                  meta:
                    type: object
                    properties:
                      applied: { type: integer }
                      conflicts: { type: integer }
                      errors: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /files:
    post:
      tags: [Files]
      summary: Upload an attachment
      description: >-
        Multipart upload. Returns a file descriptor whose `id` is then
        referenced in a `fileupload` field of a subsequent batch op. Max 50 MB;
        only safe media/document extensions are accepted.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/FileDescriptor" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /files/{id}:
    get:
      tags: [Files]
      summary: Download an attachment
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: The file stream
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "`Authorization: Bearer <token>`"

  parameters:
    BlueprintUuid:
      in: path
      name: uuid
      required: true
      schema: { type: string, format: uuid }
      description: Blueprint uuid (from /schema).
    PageFileName:
      in: path
      name: fileName
      required: true
      schema: { type: string, pattern: "^[A-Za-z0-9\\-_.]+$" }
      description: Static page base file name without extension (from /pages/tree).

  responses:
    Unauthorized:
      description: Missing, invalid, revoked or expired token; or the API is disabled.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    InvalidCredentials:
      description: Login or password incorrect.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: The user is not permitted to use the API or is deactivated.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Unknown blueprint, entry or file.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Invalid request body.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    CursorExpired:
      description: Journal history after the cursor was pruned; perform a full pull.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: Rate limit exceeded.
    FeatureUnavailable:
      description: The requested optional feature is not installed or disabled on this server.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: invalid_token }
            message: { type: string }

    UserInfo:
      type: object
      properties:
        login: { type: string }
        name: { type: string }

    BlueprintSchema:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        handle: { type: string, example: "Blog\\Post" }
        handle_slug: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [entry, stream, structure, single, global]
        structure:
          type: object
          nullable: true
          properties:
            max_depth: { type: integer }
            tree: { type: boolean }
        drafts: { type: boolean }
        multisite: { type: boolean }
        groups:
          type: array
          nullable: true
          items: { type: string }
        fingerprint:
          type: string
          description: Per-blueprint content hash; changes only when the blueprint changes.
        entry_count: { type: integer }
        fields:
          type: array
          items: { $ref: "#/components/schemas/Field" }

    Field:
      type: object
      properties:
        name: { type: string }
        type: { type: string, description: "Tailor field type code (text, richeditor, entries, …)" }
        kind:
          type: string
          enum: [scalar, json, media, relation, attachment, nested, unknown]
          description: How the value is stored/transported.
        label: { type: string }
        tab: { type: string, nullable: true }
        span: { type: string, nullable: true }
        comment: { type: string, nullable: true }
        hidden: { type: boolean }
        required: { type: boolean }
        readonly: { type: boolean, description: "True for inverse relations." }
        custom: { type: boolean, description: "Non-core field type → client renders a placeholder." }
        implicit: { type: boolean, description: "Model-added field (title, slug, is_enabled, …)." }
        config:
          type: object
          additionalProperties: true
          description: "Kind-specific extras: options, source_uuid, max_items, form, etc."

    LayoutSchema:
      type: object
      description: One static-page layout as a renderable form definition.
      properties:
        file_name: { type: string, description: "Layout base file name (the page's layout value)." }
        name: { type: string, description: "Layout description, or file name when unset." }
        use_content:
          type: boolean
          description: "When true the layout exposes a markup content field."
        fingerprint:
          type: string
          description: Per-layout content hash; changes only when the layout's form changes.
        fields:
          type: array
          description: >-
            Implicit page fields (title, url, layout, is_hidden,
            navigation_hidden, meta_title, meta_description), the layout's syntax
            fields, an optional markup field, and one field per editable
            placeholder (named `placeholder:<name>`).
          items: { $ref: "#/components/schemas/Field" }

    PageTreeNode:
      type: object
      properties:
        file_name: { type: string }
        title: { type: string }
        url: { type: string }
        layout: { type: string, nullable: true }
        is_hidden: { type: boolean }
        navigation_hidden: { type: boolean }
        content_hash: { type: string, description: "sha256 of the raw page file." }
        mtime: { type: string, format: date-time, nullable: true }
        children:
          type: array
          items: { $ref: "#/components/schemas/PageTreeNode" }

    Page:
      type: object
      description: A full, editable static page.
      properties:
        file_name: { type: string }
        title: { type: string }
        url: { type: string, description: "Read-only in v1." }
        layout: { type: string, nullable: true, description: "Read-only in v1." }
        is_hidden: { type: boolean }
        navigation_hidden: { type: boolean }
        meta_title: { type: string, nullable: true }
        meta_description: { type: string, nullable: true }
        fields:
          type: object
          additionalProperties: true
          description: >-
            Editable values keyed by field name — syntax fields, placeholder
            values (`placeholder:<name>`), and `markup` when the layout uses
            content. Matches the layout's /pages/schema fields.
        viewbag_extra:
          type: object
          additionalProperties: true
          description: View-bag keys the layout does not define; round-tripped untouched.
        content_hash: { type: string }
        mtime: { type: string, format: date-time, nullable: true }

    Menu:
      type: object
      properties:
        code: { type: string }
        name: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/MenuItem" }

    MenuItem:
      type: object
      properties:
        title: { type: string, nullable: true }
        type: { type: string, nullable: true }
        reference: { type: string, nullable: true }
        url: { type: string, nullable: true }
        extra:
          type: object
          additionalProperties: true
          description: Other item keys (code, cmsPage, viewBag, attributes, …), lossless.
        items:
          type: array
          items: { $ref: "#/components/schemas/MenuItem" }

    Entry:
      type: object
      properties:
        id: { type: integer }
        blueprint_uuid: { type: string, format: uuid }
        is_global: { type: boolean, description: "True for a global blueprint's single record." }
        content_group: { type: string, nullable: true }
        title: { type: string, nullable: true }
        slug: { type: string, nullable: true }
        is_enabled: { type: boolean }
        published_at: { type: string, format: date-time, nullable: true }
        expired_at: { type: string, format: date-time, nullable: true }
        site_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        fields:
          type: object
          additionalProperties: true
          description: >-
            Field values keyed by field name. Scalars as primitives, json kinds
            as arrays, relations as id (single) or id array (multi), attachments
            as arrays of file descriptors, nested (repeater) as arrays of items.
        relation_labels:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              properties:
                id: { type: integer }
                title: { type: string }

    ChangeItem:
      type: object
      properties:
        cursor: { type: integer }
        blueprint_uuid: { type: string, format: uuid }
        record_id: { type: integer }
        action: { type: string, enum: [created, updated, deleted] }

    BatchOp:
      type: object
      required: [op, blueprint_uuid]
      properties:
        op: { type: string, enum: [create, update, delete] }
        blueprint_uuid: { type: string, format: uuid }
        local_id: { type: string, description: "Client id echoed back for mapping." }
        id: { type: integer, description: "Server id (update/delete)." }
        base_updated_at:
          type: string
          format: date-time
          description: "Server timestamp the edit was based on (optimistic concurrency)."
        content_group: { type: string }
        fields:
          type: object
          additionalProperties: true

    BatchResult:
      type: object
      properties:
        status: { type: string, enum: [ok, conflict, error] }
        op: { type: string }
        local_id: { type: string, nullable: true }
        id: { type: integer, nullable: true }
        entry:
          allOf: [{ $ref: "#/components/schemas/Entry" }]
          description: Present on ok — the canonical server entry.
        server_state:
          description: >-
            On conflict — the untouched server entry object, or the string
            "deleted" when the record was deleted server-side.
          oneOf:
            - { $ref: "#/components/schemas/Entry" }
            - { type: string, enum: [deleted] }
        warnings:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              code: { type: string, enum: [unknown_field, readonly_field] }
              message: { type: string }
              value: { description: "The rejected value, returned so nothing is lost." }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    FieldWarning:
      type: object
      description: A field the server refused to apply, returned so nothing is lost.
      properties:
        field: { type: string }
        code: { type: string, enum: [unknown_field, readonly_field] }
        message: { type: string }
        value: { description: "The rejected value." }

    FileDescriptor:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        size: { type: integer }
        content_type: { type: string }
        url: { type: string, format: uri }

    Site:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        locale: { type: string }
        is_primary: { type: boolean }
        is_enabled: { type: boolean }
