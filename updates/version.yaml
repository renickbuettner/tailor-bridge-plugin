1.0.1:
    - Initialize plugin with token, audit log and change journal tables
    - create_tokens_table.php
    - create_audit_logs_table.php
    - create_journal_table.php
1.0.2:
    - Add plugin state table (journal prune high-water mark)
    - create_state_table.php
1.0.3:
    - Add globals API (GET /globals/{uuid}) and global writes via sync/batch
1.0.4:
    - Add multisite support with GET /sites and per-request site scoping via X-Tailor-Site
1.0.5:
    - "Fix rate limiting so pairing and API routes use separate throttle counters"
1.0.6:
    - "Fix multi recordfinder relations being truncated to a single id on read and write"
    - "Serialize taglist options, custom-tags, use-key and separator config for clients"
1.0.7:
    - "Add GET /records/{uuid}/{field} to search a recordfinder field's target model"
1.0.8:
    - "Add GET /logs returning the tail of the application log (bounded reverse-tail)"
    - "Add logs_enabled setting to gate error-log access"
1.1.0:
    - "Add optional RainLab.Pages integration: static page browsing and editing"
    - "Add GET /pages/schema, /pages/tree, /pages/file/{fileName} and PATCH to edit pages"
    - "Add GET /pages/menus and /pages/menus/{code} (read-only)"
    - "Advertise features.static_pages on /ping; add pages_enabled setting"
1.1.1:
    - "Add GET /version: dependency-free deploy marker (build id + plugin version)"
    - "Harden static-pages: nullable theme with site fallback; /ping never 500s on pages introspection"
    - "Resolve external repeater form=/groups= references (page-builder blocks editable in the app)"
    - "Support switch fields on static pages; coerce booleans to INI 1/0"
1.1.2:
    - "Bound static-pages recursion (page tree + builder groups/form) against cyclic references"
    - "Log uncatchable fatal shutdowns so GET /logs surfaces them instead of a silent 500"
1.1.3:
    - "Detect self-referential page-builder blocks: describe a recursive reference once instead of inlining it at every level (pages schema was ~20MB, now compact)"
    - "Flag recursive nested fields so clients can reuse the ancestor schema"
1.1.4:
    - "Audit data reads: record successful GET syncs/reads (who read what, when) in the audit log"
    - "Add audit_reads_enabled setting to gate read auditing"
1.1.5:
    - "Map static-page taglist fields to the json kind with tag constraints (editable in the app)"
    - "Map ruler/section layout widgets to a presentational kind (rendered as chrome, no value)"
1.1.6:
    - "Add branding settings (app title, logo, preview website URL) exposed on /ping"
